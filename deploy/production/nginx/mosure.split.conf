# Mosure production nginx config (split deployment)
# Frontend domain serves built static files
# API domain proxies to Laravel backend

# 1) Frontend: https://app.example.com
server {
    listen 80;
    server_name app.example.com;

    root /var/www/mosure-frontend/dist;
    index index.html;

    access_log /var/log/nginx/mosure-frontend.access.log;
    error_log  /var/log/nginx/mosure-frontend.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

# 2) Backend API/Admin: https://api.example.com
server {
    listen 80;
    server_name api.example.com;

    root /root/www/mosure/public;
    index index.php index.html;
    client_max_body_size 50m;

    access_log /var/log/nginx/mosure-api.access.log;
    error_log  /var/log/nginx/mosure-api.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
