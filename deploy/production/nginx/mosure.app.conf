# Mosure production nginx config (single-domain: frontend + backend in one Laravel app)
# Place to: /etc/nginx/sites-available/mosure.conf

server {
    listen 80;
    server_name mosure.example.com;

    root /var/www/mosure/public;
    index index.php index.html;

    # Increase if file uploads are large
    client_max_body_size 50m;

    access_log /var/log/nginx/mosure.access.log;
    error_log  /var/log/nginx/mosure.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        # Update to your local PHP-FPM socket or host:port
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        # Example TCP mode:
        # fastcgi_pass 127.0.0.1:9000;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Security hardening
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
